<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>좌표 검색기 - WGS84 / WTM</title>
  <style>
    body { font-family: 'Malgun Gothic', dotum, sans-serif; margin: 20px; background: #f7f7f7; }
    h2 { color: #333; }
    .panel { display: flex; gap: 16px; flex-wrap: wrap; background: white; padding: 16px; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 16px; max-width: 900px; }
    .box { border: 1px solid #ddd; border-radius: 8px; padding: 15px; flex: 1; min-width: 250px; background: #fcfdfd; }
    .box h3 { margin-top: 0; margin-bottom: 12px; font-size: 15px; color: #4A90E2; }
    .input-group { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .input-group span { font-size: 13px; font-weight: bold; width: 40px; color: #555; }
    input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; flex: 1; width: 100%; }
    
    /* 🛠️ 해결 1: 지도 크기가 변경될 때 버벅임과 타이밍 어긋남을 방지하기 위해 transition 제거 */
    #map { width: 720px; height: 400px; border-radius: 10px; border: 1px solid #ddd; }
  </style>
</head>
<body>

<h2>카카오맵 실시간 좌표 검색기</h2>

<div class="panel">
  <div class="box">
    <h3>WGS84 위경도</h3>
    <div class="input-group">
      <span>위도:</span>
      <input id="lat" type="number" step="any" placeholder="위도(Lat)" value="33.450701">
    </div>
    <div class="input-group">
      <span>경도:</span>
      <input id="lng" type="number" step="any" placeholder="경도(Lng)" value="126.570667">
    </div>
  </div>

  <div class="box">
    <h3>WTM 좌표</h3>
    <div class="input-group">
      <span>X 축:</span>
      <input id="wtmX" type="number" step="any" placeholder="WTM X">
    </div>
    <div class="input-group">
      <span>Y 축:</span>
      <input id="wtmY" type="number" step="any" placeholder="WTM Y">
    </div>
  </div>

  <div class="box">
    <h3>지도 크기 설정</h3>
    <div class="input-group">
      <span>가로:</span>
      <input id="mapWidth" type="text" value="720px" placeholder="예: 720px 또는 100%">
    </div>
    <div class="input-group">
      <span>세로:</span>
      <input id="mapHeight" type="text" value="400px" placeholder="예: 400px">
    </div>
  </div>
</div>

<div id="map"></div>

<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=535a4609bc0c9e85bc702625b75afa74&libraries=services&autoload=false"></script>
<script>
  var map, geocoder, marker;
  var debounceTimer = null;

  var latInput = document.getElementById('lat');
  var lngInput = document.getElementById('lng');
  var wtmXInput = document.getElementById('wtmX');
  var wtmYInput = document.getElementById('wtmY');
  
  var mapWidthInput = document.getElementById('mapWidth');
  var mapHeightInput = document.getElementById('mapHeight');

  kakao.maps.load(function() {
    var mapContainer = document.getElementById('map');
    var defaultPosition = new kakao.maps.LatLng(33.450701, 126.570667);

    map = new kakao.maps.Map(mapContainer, {
      center: defaultPosition,
      level: 4
    });

    marker = new kakao.maps.Marker({
      position: defaultPosition,
      map: map
    });

    geocoder = new kakao.maps.services.Geocoder();
    
    updateFromWGS84();
  });

  // 🛠️ 실시간 지도 크기 변경 함수 수정
  function resizeMap() {
    var mapContainer = document.getElementById('map');
    
    var widthVal = mapWidthInput.value.trim();
    var heightVal = mapHeightInput.value.trim();
    
    // 숫자만 입력했을 경우 뒤에 자동으로 'px'를 붙여주는 안전장치 추가
    if (/^\d+$/.test(widthVal)) widthVal += 'px';
    if (/^\d+$/.test(heightVal)) heightVal += 'px';
    
    mapContainer.style.width = widthVal;
    mapContainer.style.height = heightVal;
    
    if (map) {
      // transition이 없으므로 크기가 즉시 변경되어 relayout이 정확하게 작동합니다.
      map.relayout();
      if (marker) {
        map.setCenter(marker.getPosition());
      }
    }
  }

  function moveMap(lat, lng) {
    var position = new kakao.maps.LatLng(lat, lng);
    marker.setPosition(position);
    map.setCenter(position);
  }

  function debounce(callback) {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(callback, 300);
  }

  function updateFromWGS84() {
    debounce(function() {
      if (!geocoder) return; 

      var lat = parseFloat(latInput.value);
      var lng = parseFloat(lngInput.value);
      if (isNaN(lat) || isNaN(lng)) return;
      
      moveMap(lat, lng);
      
      geocoder.transCoord(lng, lat, function(result, status) {
        if (status === kakao.maps.services.Status.OK) {
          wtmXInput.value = result[0].x.toFixed(2);
          wtmYInput.value = result[0].y.toFixed(2);
        }
      }, {
        input_coord: kakao.maps.services.Coords.WGS84,
        output_coord: kakao.maps.services.Coords.WTM
      });
    });
  }

  function updateFromWTM() {
    debounce(function() {
      if (!geocoder) return;

      var wtmX = parseFloat(wtmXInput.value);
      var wtmY = parseFloat(wtmYInput.value);
      if (isNaN(wtmX) || isNaN(wtmY)) return;
      
      geocoder.transCoord(wtmX, wtmY, function(result, status) {
        if (status === kakao.maps.services.Status.OK) {
          var lng = result[0].x;
          var lat = result[0].y;
          latInput.value = lat.toFixed(6); 
          lngInput.value = lng.toFixed(6); 
          moveMap(lat, lng);
        }
      }, {
        input_coord: kakao.maps.services.Coords.WTM,
        output_coord: kakao.maps.services.Coords.WGS84
      });
    });
  }

  // 좌표 입력 이벤트 (실시간 반영)
  latInput.addEventListener('input', updateFromWGS84);
  lngInput.addEventListener('input', updateFromWGS84);
  wtmXInput.addEventListener('input', updateFromWTM);
  wtmYInput.addEventListener('input', updateFromWTM);

  /* 🛠️ 해결 2: 크기 변경 이벤트 리스너를 'input'에서 'change'로 변경 방안 있음
  // 입력창에서 포커스가 벗어나거나 엔터를 칠 때만 작동하여 오작동을 막습니다.
  mapWidthInput.addEventListener('input', resizeMap);
  mapHeightInput.addEventListener('input', resizeMap);
  */
</script>

</body>
</html>
